name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  prebuild:
    name: Prebuild on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: x86
          - os: macos-latest
            arch: x64
          - os: macos-15-intel
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          architecture: ${{ matrix.arch }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native tests
        run: npm run build

      - name: Run native tests
        run: npm run test

      - name: Prebuild
        run: npm run prebuild

      - name: Upload prebuilds
        uses: actions/upload-artifact@v7
        with:
          name: node-ffi-napi-prebuild-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [prebuild]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Download all prebuilds
        uses: actions/download-artifact@v8
        with:
          path: prebuilds
          merge-multiple: true

      - run: ls -R prebuilds/

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
