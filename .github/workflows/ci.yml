name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'README.md'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} with Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build native tests
        run: npm run build

      - name: Run native tests
        run: npm run test

      - name: Prebuild
        shell: bash
        run: npm run prebuild

  test-mingw:
    name: Test MinGW (MSYS2 MINGW64) on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2 with MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-nodejs
            mingw-w64-x86_64-python
            mingw-w64-x86_64-gcc
            make

      - name: Verify MinGW Node.js is active
        shell: msys2 {0}
        run: node -e "const os = require('os'); console.log('os.type():', os.type()); if (!os.type().startsWith('MINGW')) process.exit(1)"

      - name: Install dependencies
        shell: msys2 {0}
        run: npm install

      - name: Build native tests
        shell: msys2 {0}
        run: npm run build

      - name: Run tests
        shell: msys2 {0}
        run: npm test
